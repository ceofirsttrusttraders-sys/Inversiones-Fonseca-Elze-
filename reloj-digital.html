<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Digital - Múltiples Zonas Horarias</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0a1628;
            --primary-blue: #1e3a5f;
            --secondary-blue: #2d5a8c;
            --accent-gold: #d4af37;
            --text-light: #f5f5f5;
            --text-dark: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            color: var(--text-light);
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 18px;
            color: var(--accent-gold);
            letter-spacing: 1px;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .clock-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(245, 245, 245, 0.95) 100%);
            border: 3px solid var(--accent-gold);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
            text-align: center;
        }

        .clock-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.3);
        }

        .timezone-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .timezone-region {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .clock-display {
            font-size: 56px;
            font-weight: 700;
            color: var(--accent-gold);
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .date-display {
            font-size: 14px;
            color: var(--primary-blue);
            margin-top: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .utc-offset {
            font-size: 13px;
            color: #999;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
        }

        .format-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .format-btn {
            padding: 12px 24px;
            border: 2px solid var(--accent-gold);
            background: transparent;
            color: var(--accent-gold);
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .format-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-2px);
        }

        .format-btn.active {
            background: var(--accent-gold);
            color: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        .timezone-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .timezone-btn {
            padding: 10px 15px;
            border: 2px solid var(--accent-gold);
            background: transparent;
            color: var(--accent-gold);
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .timezone-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: scale(1.05);
        }

        .timezone-btn.active {
            background: var(--accent-gold);
            color: var(--primary-dark);
        }

        .footer {
            text-align: center;
            color: var(--text-light);
            margin-top: 50px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .footer p {
            margin: 5px 0;
        }

        .footer strong {
            color: var(--accent-gold);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 36px;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .clock-display {
                font-size: 42px;
            }

            .timezone-name {
                font-size: 20px;
            }
        }

        .analog-clock {
            width: 200px;
            height: 200px;
            border: 4px solid var(--accent-gold);
            border-radius: 50%;
            background: #fff;
            position: relative;
            margin: 0 auto 20px;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
        }

        .analog-clock::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--accent-gold);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
        }

        .hour-hand {
            width: 6px;
            height: 60px;
            background: var(--primary-dark);
            margin-left: -3px;
        }

        .minute-hand {
            width: 4px;
            height: 80px;
            background: var(--accent-gold);
            margin-left: -2px;
        }

        .second-hand {
            width: 2px;
            height: 90px;
            background: #e74c3c;
            margin-left: -1px;
        }

        .clock-number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-dark);
        }

        .clock-number span {
            display: inline-block;
            position: absolute;
            left: 50%;
            width: 30px;
            height: 30px;
            margin: -15px 0 0 -15px;
            text-align: center;
            line-height: 30px;
        }

        .show-analog {
            margin-top: 20px;
        }

        .toggle-switch {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border: 2px solid var(--accent-gold);
            border-radius: 6px;
            background: transparent;
            color: var(--accent-gold);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-switch:hover {
            background: rgba(212, 175, 55, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏰ Reloj Digital Global</h1>
            <p>Monitoreo de múltiples zonas horarias</p>
        </div>

        <div class="format-buttons">
            <button class="format-btn active" onclick="setFormat('24h')">
                <i class="fas fa-clock"></i> 24 Horas
            </button>
            <button class="format-btn" onclick="setFormat('12h')">
                <i class="fas fa-hourglass-half"></i> 12 Horas
            </button>
            <button class="format-btn" onclick="toggleAnalog()">
                <i class="fas fa-watch"></i> Analógico
            </button>
        </div>

        <div class="timezone-selector" id="timezoneSelector"></div>

        <div class="clocks-grid" id="clocksGrid"></div>

        <div class="footer">
            <p><strong>INVERSIONES FONSECA ELZE</strong></p>
            <p>Centro de Documentos Corporativos</p>
            <p>&copy; 2026 - Todos los derechos reservados</p>
        </div>
    </div>

    <script>
        let timeFormat = '24h';
        let showAnalogClocks = false;

        const timezones = [
            { name: 'New York', region: 'América/Nueva York', tz: 'America/New_York' },
            { name: 'Londres', region: 'Europa/Londres', tz: 'Europe/London' },
            { name: 'Tokio', region: 'Asia/Tokio', tz: 'Asia/Tokyo' },
            { name: 'Sídney', region: 'Oceanía/Sídney', tz: 'Australia/Sydney' },
            { name: 'Dubai', region: 'Asia/Dubai', tz: 'Asia/Dubai' },
            { name: 'Hong Kong', region: 'Asia/Hong Kong', tz: 'Asia/Hong_Kong' },
            { name: 'Singapur', region: 'Asia/Singapur', tz: 'Asia/Singapore' },
            { name: 'Estambul', region: 'Asia/Estambul', tz: 'Europe/Istanbul' },
            { name: 'París', region: 'Europa/París', tz: 'Europe/Paris' },
            { name: 'Toronto', region: 'América/Toronto', tz: 'America/Toronto' },
            { name: 'México', region: 'América/México', tz: 'America/Mexico_City' },
            { name: 'São Paulo', region: 'América/São Paulo', tz: 'America/Sao_Paulo' }
        ];

        function initializeTimezoneSelector() {
            const selector = document.getElementById('timezoneSelector');
            selector.innerHTML = timezones.map((tz, index) => `
                <button class="timezone-btn ${index < 6 ? 'active' : ''}" onclick="toggleTimezone('${tz.tz}', this)">
                    ${tz.name}
                </button>
            `).join('');
        }

        function toggleTimezone(tz, button) {
            button.classList.toggle('active');
            updateClocks();
        }

        function getActiveTimezones() {
            const buttons = document.querySelectorAll('.timezone-btn.active');
            return Array.from(buttons).map(btn => {
                const name = btn.textContent.trim();
                return timezones.find(tz => tz.name === name);
            });
        }

        function formatTime(date, format) {
            if (format === '24h') {
                return date.toLocaleString('es-ES', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
            } else {
                return date.toLocaleString('es-ES', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                });
            }
        }

        function createAnalogClock(date) {
            const hours = date.getHours() % 12;
            const minutes = date.getMinutes();
            const seconds = date.getSeconds();

            const hourDeg = (hours * 30) + (minutes * 0.5);
            const minuteDeg = (minutes * 6) + (seconds * 0.1);
            const secondDeg = seconds * 6;

            return `
                <div class="analog-clock">
                    <div class="hand hour-hand" style="transform: rotate(${hourDeg}deg)"></div>
                    <div class="hand minute-hand" style="transform: rotate(${minuteDeg}deg)"></div>
                    <div class="hand second-hand" style="transform: rotate(${secondDeg}deg)"></div>
                </div>
            `;
        }

        function updateClocks() {
            const grid = document.getElementById('clocksGrid');
            const activeTimezones = getActiveTimezones();

            grid.innerHTML = activeTimezones.map(tz => {
                const date = new Date();
                const timeString = date.toLocaleString('es-ES', {
                    timeZone: tz.tz
                });
                const tzDate = new Date(timeString);

                const hours = tzDate.getHours();
                const minutes = String(tzDate.getMinutes()).padStart(2, '0');
                const seconds = String(tzDate.getSeconds()).padStart(2, '0');
                const day = String(tzDate.getDate()).padStart(2, '0');
                const month = String(tzDate.getMonth() + 1).padStart(2, '0');
                const year = tzDate.getFullYear();

                const displayTime = formatTime(tzDate, timeFormat);
                const offset = getUTCOffset(tz.tz);
                const dayName = tzDate.toLocaleString('es-ES', { weekday: 'long' });

                const analogClock = showAnalogClocks ? createAnalogClock(tzDate) : '';

                return `
                    <div class="clock-card">
                        <div class="timezone-name">${tz.name}</div>
                        <div class="timezone-region">${tz.region}</div>
                        ${analogClock}
                        <div class="clock-display">${displayTime}</div>
                        <div class="date-display">
                            <strong>${dayName.charAt(0).toUpperCase() + dayName.slice(1)}</strong><br>
                            ${day}/${month}/${year}
                        </div>
                        <div class="utc-offset">UTC ${offset}</div>
                    </div>
                `;
            }).join('');
        }

        function getUTCOffset(timezone) {
            const date = new Date();
            const timeString = date.toLocaleString('sv-SE', { timeZone: timezone });
            const tzDate = new Date(timeString);
            
            const offset = (tzDate - date) / 60000;
            const hours = Math.floor(Math.abs(offset) / 60);
            const minutes = Math.abs(offset) % 60;
            
            const sign = offset >= 0 ? '+' : '-';
            return `${sign}${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
        }

        function setFormat(format) {
            timeFormat = format;
            document.querySelectorAll('.format-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateClocks();
        }

        function toggleAnalog() {
            showAnalogClocks = !showAnalogClocks;
            updateClocks();
        }

        // Inicializar
        initializeTimezoneSelector();
        updateClocks();

        // Actualizar cada segundo
        setInterval(updateClocks, 1000);
    </script>
</body>
</html>
